<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mijn Kunstwerken Gallery</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  body { font-family: system-ui, sans-serif; background: #111; color: #e0e0e0; padding: 2rem; }
  .gallery { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 2rem; }
  figure { position: relative; overflow: hidden; border-radius: 12px; }
  img { width: 100%; height: auto; display: block; }
  figcaption { display: flex; justify-content: space-between; padding: 0.5rem; background: rgba(0,0,0,0.6); color: #ccc; }
  .heart { cursor:pointer; font-size:1.6rem; transition:0.3s; }
  .heart.liked { color:#ff4d6d; transform:scale(1.2); }
  .like-count { margin-left:0.5rem; font-weight:bold; color:#d4af37; }
</style>
</head>
<body>

<h1>Mijn Kunstwerken</h1>
<p>Klik op een hartje om te liken (gedeeld voor iedereen)</p>

<main class="gallery">

  <figure>
    <img src="images/jelly1.jpg" alt="Jelly">
    <figcaption>
      Jelly Cocker Spaniel
      <span>
        <span class="heart" data-id="jelly1">♡</span>
        <span class="like-count" data-id="jelly1">0</span>
      </span>
    </figcaption>
  </figure>

  <figure>
    <img src="images/theodore.png" alt="Théodore">
    <figcaption>
      Théodore - Cavia
      <span>
        <span class="heart" data-id="theodore">♡</span>
        <span class="like-count" data-id="theodore">0</span>
      </span>
    </figcaption>
  </figure>

  <figure>
    <img src="images/princesse.jpg" alt="Princesse">
    <figcaption>
      Princesse - Cavia
      <span>
        <span class="heart" data-id="princesse">♡</span>
        <span class="like-count" data-id="princesse">0</span>
      </span>
    </figcaption>
  </figure>

</main>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbx6kvGm6d3JTNnCnPwR5TUFEWCCn_GPVuchGeULD2i6L3pLs1BzXhrMyP7rgZS-I1L2fg/exec";

document.querySelectorAll('.heart').forEach(heart=>{
  const id = heart.dataset.id;
  const countEl = document.querySelector(`.like-count[data-id="${id}"]`);

  // Huidige teller ophalen
  fetch(`${scriptURL}?id=${id}`)
    .then(r=>r.text())
    .then(count=>{
      countEl.textContent = count;
      if(parseInt(count) > 0) heart.classList.add('liked');
    });

  // Klik event
  heart.addEventListener('click', ()=>{
    fetch(`${scriptURL}?id=${id}`, { method: "POST" })
      .then(r=>r.text())
      .then(count=>{
        countEl.textContent = count;
        heart.classList.add('liked');
      })
      .catch(err=>console.error("POST error:", err));
  });
});
</script>

</body>
</html>
